<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notes</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- Apply saved theme before paint to avoid a flash of the wrong theme. -->
  <script>
    try {
      const t = localStorage.getItem("notes-app.theme");
      if (t) document.documentElement.setAttribute("data-theme", t);
    } catch {}
  </script>
</head>
<body>
  <div class="app">
    <!-- Sidebar: note list -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>Notes</h1>
        <div class="header-actions">
          <button id="theme-toggle" class="btn-theme" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
          <button id="new-note" class="btn-new" title="New note">+ New</button>
        </div>
      </div>
      <input id="search" class="search" type="search" placeholder="Search notes…" />
      <ul id="note-list" class="note-list"></ul>
    </aside>

    <!-- Main editor -->
    <main class="editor-pane">
      <div id="empty-state" class="empty-state">
        <p>No note selected.</p>
        <p>Create a new note to get started.</p>
      </div>

      <div id="editor-wrap" class="editor-wrap hidden">
        <input id="title" class="title-input" type="text" placeholder="Untitled note" />

        <!-- Formatting toolbar -->
        <div class="toolbar">
          <button data-cmd="bold" title="Bold (Ctrl+B)"><b>B</b></button>
          <button data-cmd="italic" title="Italic (Ctrl+I)"><i>I</i></button>
          <button data-cmd="underline" title="Underline (Ctrl+U)"><u>U</u></button>
          <button data-cmd="strikeThrough" title="Strikethrough"><s>S</s></button>
          <span class="sep"></span>
          <button data-cmd="insertUnorderedList" title="Bullet list">• List</button>
          <button data-cmd="insertOrderedList" title="Numbered list">1. List</button>
          <span class="sep"></span>
          <button data-cmd="formatBlock" data-value="h2" title="Heading">H</button>
          <button data-cmd="removeFormat" title="Clear formatting">✕ Format</button>
        </div>

        <div id="content" class="content" contenteditable="true" spellcheck="true"></div>

        <div class="status-bar">
          <span id="meta"></span>
          <button id="delete-note" class="btn-delete">Delete</button>
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
